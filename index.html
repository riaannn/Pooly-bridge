<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Poly Bridge</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Poly Bridge</div>
      </div>
    </div>
    <script>

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Poly Bridge 1 WebGL.loader.js";
      var config = {
        dataUrl: null, // will be set after merge
        frameworkUrl: buildUrl + "/Poly Bridge 1 WebGL.framework.js",
        codeUrl: buildUrl + "/Poly Bridge 1 WebGL.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Dry Cactus",
        productName: "Poly Bridge",
        productVersion: "0.75.2",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      loadingBar.style.display = "block";

      async function fetchPart(url, onProgress, partLoaded, partTotal) {
        const response = await fetch(url);
        const reader = response.body.getReader();
        const chunks = [];
        let loaded = 0;
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          loaded += value.length;
          onProgress(partLoaded + loaded, partTotal);
        }
        const total = chunks.reduce((acc, c) => acc + c.length, 0);
        const merged = new Uint8Array(total);
        let offset = 0;
        for (const chunk of chunks) {
          merged.set(chunk, offset);
          offset += chunk.length;
        }
        return merged;
      }

      async function loadAndMergeData() {
        const part1Url = buildUrl + "/Poly Bridge 1 WebGL.data.part1";
        const part2Url = buildUrl + "/Poly Bridge 1 WebGL.data.part2";

        // Get file sizes for progress tracking
        const [head1, head2] = await Promise.all([
          fetch(part1Url, { method: 'HEAD' }),
          fetch(part2Url, { method: 'HEAD' })
        ]);
        const size1 = parseInt(head1.headers.get('Content-Length') || '0');
        const size2 = parseInt(head2.headers.get('Content-Length') || '0');
        const totalSize = size1 + size2;

        function onProgress(loaded, total) {
          progressBarFull.style.width = (50 * loaded / (totalSize || 1)) + "%";
        }

        const [part1, part2] = await Promise.all([
          fetchPart(part1Url, onProgress, 0, totalSize),
          fetchPart(part2Url, onProgress, size1, totalSize)
        ]);

        const merged = new Uint8Array(part1.length + part2.length);
        merged.set(part1, 0);
        merged.set(part2, part1.length);

        const blob = new Blob([merged], { type: 'application/octet-stream' });
        return URL.createObjectURL(blob);
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        loadAndMergeData().then((mergedDataUrl) => {
          config.dataUrl = mergedDataUrl;
          createUnityInstance(canvas, config, (progress) => {
            progressBarFull.style.width = 50 + (50 * progress) + "%";
          }).then((unityInstance) => {
            loadingBar.style.display = "none";
            fullscreenButton.onclick = () => {
              unityInstance.SetFullscreen(1);
            };
          }).catch((message) => {
            alert(message);
          });
        }).catch((err) => {
          alert("Failed to load game data: " + err);
        });
      };

      document.body.appendChild(script);

    </script>
  </body>
</html>
